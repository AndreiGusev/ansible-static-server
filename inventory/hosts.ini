# Inventory for the Docker-based test host.
# The container publishes SSH on host port 2222 (see docker/docker-compose.yml).
[static_servers]
static-server ansible_host=127.0.0.1 ansible_port=2222

[static_servers:vars]
ansible_user=deploy
ansible_ssh_private_key_file=keys/id_ansible
ansible_python_interpreter=/usr/bin/python3
