---
# Ubuntu 24.04 ships `Include /etc/ssh/sshd_config.d/*.conf` in the main
# sshd_config, so a drop-in file is the clean, idempotent way to harden sshd.
- name: Deploy sshd hardening drop-in
  ansible.builtin.template:
    src: 99-hardening.conf.j2
    dest: /etc/ssh/sshd_config.d/99-hardening.conf
    owner: root
    group: root
    mode: "0644"
    # Validate the generated file before it is put in place.
    validate: "/usr/sbin/sshd -t -f %s"
  notify: Restart ssh
