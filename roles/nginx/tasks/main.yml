---
- name: Install nginx
  ansible.builtin.apt:
    name: nginx
    state: present

- name: Ensure web root exists
  ansible.builtin.file:
    path: "{{ nginx_images_dir }}"
    state: directory
    owner: www-data
    group: www-data
    mode: "0755"

- name: Remove obsolete standalone gzip drop-in
  # gzip is configured inside the vhost server block to avoid duplicating the
  # http-level `gzip on;` already present in the stock nginx.conf.
  ansible.builtin.file:
    path: /etc/nginx/conf.d/gzip.conf
    state: absent
  notify: Reload nginx

- name: Deploy static vhost
  ansible.builtin.template:
    src: static.conf.j2
    dest: /etc/nginx/sites-available/static.conf
    owner: root
    group: root
    mode: "0644"
  notify: Reload nginx

- name: Enable static vhost
  ansible.builtin.file:
    src: /etc/nginx/sites-available/static.conf
    dest: /etc/nginx/sites-enabled/static.conf
    state: link
  notify: Reload nginx

- name: Remove default vhost
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: Reload nginx

- name: Ensure nginx is started and enabled
  ansible.builtin.service:
    name: nginx
    state: started
    enabled: true
