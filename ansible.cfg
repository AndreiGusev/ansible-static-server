[defaults]
inventory = inventory/hosts.ini
roles_path = roles
# TEST-ONLY: the container is recreated on every `docker compose up`, so its
# host key changes and would otherwise block the connection. Do NOT carry this
# (or the StrictHostKeyChecking=no below) over to real hosts - there you want
# host key verification on.
host_key_checking = False
retry_files_enabled = False
callbacks_enabled = ansible.builtin.default
result_format = yaml
interpreter_python = auto_silent
deprecation_warnings = True

[privilege_escalation]
become = True
become_method = sudo
become_user = root

[ssh_connection]
pipelining = True
# UserKnownHostsFile=/dev/null + StrictHostKeyChecking=no are test-only (see note
# above): they keep the recreated container from tripping host key checks.
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o UserKnownHostsFile=/dev/null -o StrictHostKeyChecking=no
